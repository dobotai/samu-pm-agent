<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Automations</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Dashboard-specific overrides */
        body { overflow: auto; }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        .dash-header h1 { font-size: 1.25rem; }
        .dash-nav { display: flex; gap: 0.5rem; }
        .dash-nav a {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .dash-nav a:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .dash-nav a.active { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }

        .dash-main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dash-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .dash-meta-left { color: var(--text-secondary); font-size: 0.875rem; }
        .dash-meta-left span { color: var(--success-color); font-weight: 600; }

        /* Automation cards */
        .auto-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .auto-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
        }
        .auto-card-header:hover { background: rgba(255,255,255,0.02); }
        .auto-card-left { display: flex; flex-direction: column; gap: 0.25rem; }
        .auto-card-name { font-size: 1.1rem; font-weight: 600; }
        .auto-card-desc { color: var(--text-secondary); font-size: 0.8rem; }
        .auto-card-right { display: flex; align-items: center; gap: 1rem; }

        /* Status badge */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--success-color); }
        .badge-failed  { background: rgba(239,68,68,0.15); color: var(--error-color); }
        .badge-running { background: rgba(79,70,229,0.15); color: var(--primary-color); }
        .badge-idle    { background: rgba(100,116,139,0.15); color: var(--secondary-color); }
        .badge-disabled{ background: rgba(100,116,139,0.1); color: var(--text-secondary); }

        /* Card details */
        .auto-card-body {
            display: none;
            padding: 0 1.5rem 1.25rem;
            border-top: 1px solid var(--border-color);
        }
        .auto-card.expanded .auto-card-body { display: block; padding-top: 1.25rem; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .detail-item label { display: block; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
        .detail-item .val { font-size: 0.9rem; }

        .auto-card-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .auto-card-actions button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auto-card-actions button:hover { background: var(--primary-color); border-color: var(--primary-color); }
        .auto-card-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
        .auto-card-actions button:disabled:hover { background: var(--bg-tertiary); border-color: var(--border-color); }

        /* Toggle switch */
        .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; inset: 0;
            background: var(--bg-tertiary); border-radius: 24px; transition: 0.2s;
        }
        .toggle-slider::before {
            content: ""; position: absolute; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background: var(--text-secondary);
            border-radius: 50%; transition: 0.2s;
        }
        .toggle input:checked + .toggle-slider { background: var(--primary-color); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

        /* History table */
        .history-section h4 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; margin-bottom: 0.75rem; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .history-table th { text-align: left; padding: 0.5rem 0.75rem; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border-color); }
        .history-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(51,65,85,0.5); }
        .history-table tr:last-child td { border-bottom: none; }
        .history-empty { color: var(--text-secondary); font-size: 0.8rem; padding: 1rem 0; }

        /* Responsive */
        @media (max-width: 640px) {
            .dash-main { padding: 1rem; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dash-header">
        <h1>PM Automations</h1>
        <nav class="dash-nav">
            <a href="/" class="active">Automations</a>
            <a href="/chat">Chat</a>
        </nav>
    </div>

    <main class="dash-main">
        <div class="dash-meta">
            <div class="dash-meta-left">
                Scheduler: <span id="scheduler-status">Loading...</span>
                &nbsp;&middot;&nbsp; Timezone: <span id="tz">--</span>
            </div>
            <div style="font-size:0.75rem;color:var(--text-secondary)" id="last-poll"></div>
        </div>

        <div id="automations-container">
            <div style="text-align:center;padding:4rem 0;color:var(--text-secondary)">Loading automations...</div>
        </div>
    </main>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
